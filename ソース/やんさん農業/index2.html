<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Yansan Skin Editor</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        --bg0: #081126;
        --bg1: #12203c;
        --bg2: #1d3158;
        --line: #3f5f93;
        --text: #e9f1ff;
        --muted: #a9bddf;
        --accent: #ff8b00;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: radial-gradient(circle at 20% 0%, #15294e 0, #0b1630 45%, #081126 100%); color: var(--text); font-family: "Hiragino Sans", "Yu Gothic", sans-serif; }
      .app { height: 100%; display: grid; grid-template-columns: 320px 1fr 340px; gap: 12px; padding: 12px; }
      .panel { background: linear-gradient(180deg, rgba(18,31,58,.95), rgba(9,17,36,.95)); border: 1px solid var(--line); border-radius: 12px; padding: 10px; overflow: auto; }
      .title { font-size: 13px; font-weight: 700; letter-spacing: .04em; color: #f4f7fa; margin: 6px 0 8px; }
      .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
      .row > * { min-width: 0; }
      input[type="text"], button { height: 32px; border-radius: 8px; border: 1px solid #486ca8; background: #14284f; color: #f5f7fb; padding: 0 10px; }
      button { cursor: pointer; }
      button.primary { background: linear-gradient(180deg, #ff960f, #dc7300); border-color: #d66c00; font-weight: 700; }
      button:disabled { opacity: .45; cursor: not-allowed; }
      .split { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .name-row { display: grid; grid-template-columns: 1fr 36px; gap: 8px; }
      .add-btn { font-size: 20px; font-weight: 700; line-height: 1; padding: 0; }
      .item-list { max-height: 140px; overflow-y: auto; border: 1px solid #3f5f93; border-radius: 10px; padding: 6px; background: #0f1f3e; display: grid; gap: 6px; margin-bottom: 8px; }
      .item-list.tall { max-height: 220px; }
      .item-btn { width: 100%; text-align: left; height: 34px; border-radius: 8px; border: 1px solid #3f5f93; background: #14284f; color: #e9f1ff; padding: 0 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .item-btn.asset { display: flex; align-items: center; gap: 8px; height: 40px; padding: 0 8px; }
      .item-btn.asset img { width: 24px; height: 24px; image-rendering: pixelated; border: 1px solid #5a6a84; background: rgba(255,255,255,.04); flex: 0 0 auto; }
      .item-btn.asset span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .item-btn.active { outline: 2px solid #a8d0ff; background: #25406f; }
      .context-menu { position: fixed; z-index: 20; min-width: 132px; background: #0d1b37; border: 1px solid #4c70a8; border-radius: 8px; padding: 6px; display: none; box-shadow: 0 10px 22px rgba(0,0,0,.35); }
      .context-menu.open { display: grid; gap: 6px; }
      .context-menu button { width: 100%; height: 30px; text-align: left; }
      .context-menu button.danger { border-color: #a84c4c; background: #5b2323; }
      .muted { color: var(--muted); font-size: 12px; }
      .canvas-wrap { display: grid; place-items: center; background: #3f4147; border: 1px solid var(--line); border-radius: 12px; padding: 10px; min-height: calc(100vh - 24px); }
      .checker { position: relative; width: min(80vmin, 760px); aspect-ratio: 1; border: 1px solid #596171; border-radius: 12px; overflow: hidden; background:
        linear-gradient(45deg, #ececec 25%, transparent 25%),
        linear-gradient(-45deg, #ececec 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #ececec 75%),
        linear-gradient(-45deg, transparent 75%, #ececec 75%),
        #ffffff;
        background-size: 16px 16px;
        background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      }
      #paintCanvas { image-rendering: pixelated; width: 100%; height: 100%; display: block; cursor: crosshair; }
      .toolbar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin: 8px 0; }
      .palette { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; }
      .swatch { width: 100%; aspect-ratio: 1; border: 1px solid #6a7282; border-radius: 4px; cursor: pointer; }
      .swatch.selected { outline: 2px solid #ffd26b; }
      .swatch.transparent { background:
        linear-gradient(45deg, #ddd 25%, transparent 25%),
        linear-gradient(-45deg, #ddd 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #ddd 75%),
        linear-gradient(-45deg, transparent 75%, #ddd 75%),
        #fff;
        background-size: 8px 8px;
        background-position: 0 0, 0 4px, 4px -4px, -4px 0;
      }
      .picker-box { display: grid; grid-template-columns: 1fr 34px; gap: 8px; }
      #svCanvas, #hueCanvas { border: 1px solid #596171; border-radius: 8px; image-rendering: pixelated; }
      #svCanvas { width: 100%; height: 180px; }
      #hueCanvas { width: 34px; height: 180px; }
      .thumbs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
      .thumb { border: 1px solid #3f5f93; border-radius: 8px; padding: 4px; cursor: pointer; background: #14284f; }
      .thumb.active { outline: 2px solid #ffd26b; }
      .thumb canvas { width: 100%; aspect-ratio: 1; image-rendering: pixelated; display: block; background: rgba(255,255,255,.04); }
      .status { font-size: 12px; color: #d5dde9; min-height: 18px; }
      .small { font-size: 11px; color: #b6becb; }
      .layers-wrap { display: none; }
      .layer-head { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
      .layer-list { max-height: 70vh; overflow-y: auto; border: 1px solid #3f5f93; border-radius: 10px; background: #101b2f; }
      .layer-row { display: grid; grid-template-columns: 30px 44px 1fr; gap: 8px; align-items: center; padding: 6px; border-bottom: 1px solid #2d3e5f; cursor: pointer; }
      .layer-row:last-child { border-bottom: 0; }
      .layer-row.active { background: #33496f; }
      .layer-eye { width: 24px; height: 24px; border: 1px solid #516589; border-radius: 6px; background: #203659; color: #dce8ff; padding: 0; }
      .layer-thumb { width: 40px; height: 40px; border: 1px solid #60708a; image-rendering: pixelated; background:
        linear-gradient(45deg, #d9d9d9 25%, transparent 25%),
        linear-gradient(-45deg, #d9d9d9 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #d9d9d9 75%),
        linear-gradient(-45deg, transparent 75%, #d9d9d9 75%),
        #ffffff;
        background-size: 8px 8px;
        background-position: 0 0, 0 4px, 4px -4px, -4px 0;
      }
      .layer-name { font-size: 12px; color: #eaf2ff; line-height: 1.25; white-space: pre-line; }
    </style>
  </head>
  <body>
    <div class="app">
      <section class="panel">
        <div class="title">Skin Setup</div>
        <div class="row split">
          <button id="modeSkin" class="primary">Skin</button>
          <button id="modeAssets">Assets</button>
        </div>
        <div class="row"><label class="small">アイテム(服)名</label></div>
        <div class="name-row">
          <input id="skinName" type="text" placeholder="new_skin_name" />
          <button id="addSkin" class="add-btn" title="アイテム追加">+</button>
        </div>
        <div id="itemList" class="item-list"></div>
        <div id="assetModeWrap" style="display:none">
          <div class="title">Assets画像一覧</div>
          <div id="assetList" class="item-list tall"></div>
          <div class="row"><label class="small">新規画像パス(assets/配下)</label></div>
          <input id="assetPath" type="text" placeholder="item/new_image.png" />
          <div class="row split" style="margin-top:8px">
            <input id="assetWidth" type="text" value="64" />
            <input id="assetHeight" type="text" value="64" />
          </div>
          <div class="row split">
            <button id="createAsset">新規作成</button>
            <button id="resizeAsset">サイズ変更</button>
          </div>
        </div>
        <div class="row split">
          <button id="newSkin">空作成</button>
          <button id="saveCurrent">保存</button>
        </div>
        <div class="row">
          <button id="saveAll" class="primary">全保存</button>
        </div>
        <div class="row">
          <button id="pickDir">保存先(file://)</button>
        </div>

        <div class="title">Tool</div>
        <div class="toolbar">
          <button id="toolPen" class="primary">ペン</button>
          <button id="toolFill">塗</button>
          <button id="toolErase">消</button>
        </div>
        <div class="row split">
          <button id="undoBtn">戻す</button>
          <button id="redoBtn">進む</button>
        </div>
        <div class="small">右クリック押下中はスポイト。透明を拾うと消しゴムに切替。</div>

        <div class="title">Color Picker</div>
        <div class="picker-box">
          <canvas id="svCanvas" width="180" height="180"></canvas>
          <canvas id="hueCanvas" width="34" height="180"></canvas>
        </div>
        <div class="row">
          <input id="hexInput" type="text" value="#ff8b00" />
          <button id="addFav">+</button>
        </div>

        <div class="title">カラーセット</div>
        <div id="basePalette" class="palette"></div>
        <div class="title">お気に入り</div>
        <div id="favPalette" class="palette"></div>
        <div class="title">このアイテムの色</div>
        <div id="itemPalette" class="palette"></div>

        <div class="title">Status</div>
        <div id="status" class="status"></div>
      </section>

      <section class="canvas-wrap">
        <div class="checker"><canvas id="paintCanvas" width="64" height="64"></canvas></div>
      </section>

      <section class="panel">
        <div class="title" id="framesTitle">Frames (Yansan 全画像)</div>
        <div id="frameInfo" class="small"></div>
        <div id="thumbs" class="thumbs"></div>
        <div id="layersWrap" class="layers-wrap">
          <div class="layer-head">
            <button id="addLayerBtn">+ レイヤー</button>
            <button id="deleteLayerBtn">削除</button>
          </div>
          <div id="layerList" class="layer-list"></div>
        </div>
      </section>
    </div>
    <div id="itemContextMenu" class="context-menu">
      <button id="menuDeleteSkin" class="danger">削除</button>
      <button id="menuCancelSkin">止める</button>
    </div>

    <script>
      (() => {
        "use strict";

        const BASE_PALETTE = [
          "#000000", "#ffffff", "#7f7f7f", "#c3c3c3", "#6b3f1f", "#b8753b", "#f5d29f", "#ffe07a", "#ff8b00", "#ff4b00",
          "#cc1f1f", "#8f1212", "#ff6fae", "#ffb6d9", "#5328ff", "#3367ff", "#3aa8ff", "#20d4d6", "#18b253", "#0c7d33",
        ];
        const DEFAULT_FRAMES = [
          "back_idle1", "back_idle2", "back_idle3", "back_run1", "back_run2",
          "front_idle1", "front_idle2", "front_idle3", "front_run1", "front_run2",
          "side_idle1", "side_idle2", "side_idle3", "side_run1", "side_run2",
          "2side_idle1", "2side_idle2", "2side_idle3", "2side_run1", "2side_run2",
        ];

        const app = {
          editorMode: "skin",
          frames: [],
          skins: [],
          assetFiles: new Set(),
          assetPaths: [],
          skinName: "",
          currentFrame: "",
          currentAssetPath: "",
          layerMap: new Map(),
          assetDocMap: new Map(),
          undoMap: new Map(),
          redoMap: new Map(),
          assetUndoMap: new Map(),
          assetRedoMap: new Map(),
          tool: "pen",
          prevTool: "pen",
          eyedropTemp: false,
          eyedropTransparentHit: false,
          selectedColor: { r: 255, g: 139, b: 0, a: 255 },
          hsv: { h: 33, s: 100, v: 100 },
          favorites: [],
          itemColors: [],
          mouseDown: false,
          loaded: false,
          offlineMode: false,
          outputRootHandle: null,
          selectionAll: false,
          clipboardLayer: null,
          contextMenuSkin: "",
          skinDrafts: new Map(),
          skinDeleteUndoStack: [],
          skinDeleteRedoStack: [],
          moveDrag: false,
          moveStartPixel: null,
          moveSnapshot: null,
        };
        const HANDLE_DB_NAME = "yansan_skin_editor_handles_v1";
        const HANDLE_STORE_NAME = "handles";
        const HANDLE_KEY_OUTPUT_ROOT = "outputRootHandle";
        const FAVORITES_STORAGE_KEY = "yansan_skin_editor_favorites_v1";

        const els = {
          itemList: document.getElementById("itemList"),
          assetModeWrap: document.getElementById("assetModeWrap"),
          assetList: document.getElementById("assetList"),
          assetPath: document.getElementById("assetPath"),
          assetWidth: document.getElementById("assetWidth"),
          assetHeight: document.getElementById("assetHeight"),
          createAsset: document.getElementById("createAsset"),
          resizeAsset: document.getElementById("resizeAsset"),
          modeSkin: document.getElementById("modeSkin"),
          modeAssets: document.getElementById("modeAssets"),
          skinName: document.getElementById("skinName"),
          addSkin: document.getElementById("addSkin"),
          newSkin: document.getElementById("newSkin"),
          saveCurrent: document.getElementById("saveCurrent"),
          saveAll: document.getElementById("saveAll"),
          pickDir: document.getElementById("pickDir"),
          toolPen: document.getElementById("toolPen"),
          toolFill: document.getElementById("toolFill"),
          toolErase: document.getElementById("toolErase"),
          undoBtn: document.getElementById("undoBtn"),
          redoBtn: document.getElementById("redoBtn"),
          addFav: document.getElementById("addFav"),
          hexInput: document.getElementById("hexInput"),
          svCanvas: document.getElementById("svCanvas"),
          hueCanvas: document.getElementById("hueCanvas"),
          paintCanvas: document.getElementById("paintCanvas"),
          basePalette: document.getElementById("basePalette"),
          favPalette: document.getElementById("favPalette"),
          itemPalette: document.getElementById("itemPalette"),
          thumbs: document.getElementById("thumbs"),
          layersWrap: document.getElementById("layersWrap"),
          addLayerBtn: document.getElementById("addLayerBtn"),
          deleteLayerBtn: document.getElementById("deleteLayerBtn"),
          layerList: document.getElementById("layerList"),
          framesTitle: document.getElementById("framesTitle"),
          frameInfo: document.getElementById("frameInfo"),
          status: document.getElementById("status"),
          itemContextMenu: document.getElementById("itemContextMenu"),
          menuDeleteSkin: document.getElementById("menuDeleteSkin"),
          menuCancelSkin: document.getElementById("menuCancelSkin"),
        };

        const paintCtx = els.paintCanvas.getContext("2d", { willReadFrequently: true });
        const svCtx = els.svCanvas.getContext("2d");
        const hueCtx = els.hueCanvas.getContext("2d");
        paintCtx.imageSmoothingEnabled = false;

        function setStatus(msg) { els.status.textContent = msg; }
        function loadFavoritesFromStorage() {
          try {
            const raw = localStorage.getItem(FAVORITES_STORAGE_KEY);
            if (!raw) return;
            const parsed = JSON.parse(raw);
            if (!Array.isArray(parsed)) return;
            const normalized = parsed
              .map((c) => String(c || "").trim().toLowerCase())
              .filter((c) => /^#[0-9a-f]{6}$/.test(c));
            app.favorites = [...new Set(normalized)].slice(0, 40);
          } catch (_) {}
        }
        function saveFavoritesToStorage() {
          try {
            localStorage.setItem(FAVORITES_STORAGE_KEY, JSON.stringify(app.favorites));
          } catch (_) {}
        }
        function setTool(nextTool) {
          app.eyedropTemp = false;
          app.eyedropTransparentHit = false;
          app.tool = nextTool;
          renderPalettes();
        }
        function refreshToolUI() {
          const isPen = app.tool === "pen";
          const isFill = app.tool === "fill";
          const isErase = app.tool === "erase";
          els.toolPen.classList.toggle("primary", isPen);
          els.toolFill.classList.toggle("primary", isFill);
          els.toolErase.classList.toggle("primary", isErase);
          if (app.eyedropTemp || app.tool === "eyedrop") {
            els.paintCanvas.style.cursor = "copy";
            return;
          }
          if (app.moveDrag) {
            els.paintCanvas.style.cursor = "grabbing";
            return;
          }
          if (isErase) {
            els.paintCanvas.style.cursor = "cell";
            return;
          }
          if (isFill) {
            els.paintCanvas.style.cursor = "alias";
            return;
          }
          els.paintCanvas.style.cursor = "crosshair";
        }

        function getCurrentSize() {
          if (app.editorMode === "assets") {
            const doc = app.assetDocMap.get(app.currentAssetPath);
            if (doc && Number.isFinite(doc.w) && Number.isFinite(doc.h)) {
              return { w: Math.max(1, Math.floor(doc.w)), h: Math.max(1, Math.floor(doc.h)) };
            }
          }
          return { w: 64, h: 64 };
        }

        function resizePaintCanvas(w, h) {
          const width = Math.max(1, Math.floor(Number(w) || 64));
          const height = Math.max(1, Math.floor(Number(h) || 64));
          els.paintCanvas.width = width;
          els.paintCanvas.height = height;
          paintCtx.imageSmoothingEnabled = false;
          els.assetWidth.value = String(width);
          els.assetHeight.value = String(height);
        }

        function getActiveLayerMap() {
          return app.layerMap;
        }

        function getActiveUndoMap() {
          return app.editorMode === "assets" ? app.assetUndoMap : app.undoMap;
        }

        function getActiveRedoMap() {
          return app.editorMode === "assets" ? app.assetRedoMap : app.redoMap;
        }

        function getCurrentKey() {
          return app.editorMode === "assets" ? app.currentAssetPath : app.currentFrame;
        }

        function setEditorMode(mode) {
          app.editorMode = mode === "assets" ? "assets" : "skin";
          const isSkin = app.editorMode === "skin";
          els.modeSkin.classList.toggle("primary", isSkin);
          els.modeAssets.classList.toggle("primary", !isSkin);
          els.itemList.style.display = isSkin ? "grid" : "none";
          els.skinName.style.display = isSkin ? "" : "none";
          els.addSkin.style.display = isSkin ? "" : "none";
          els.newSkin.style.display = isSkin ? "" : "none";
          els.assetModeWrap.style.display = isSkin ? "none" : "block";
          els.framesTitle.textContent = isSkin ? "Frames (Yansan 全画像)" : "Assets Editor";
          els.thumbs.style.display = isSkin ? "grid" : "none";
          els.layersWrap.style.display = isSkin ? "none" : "block";
          if (isSkin) {
            resizePaintCanvas(64, 64);
            redrawMain();
          } else if (app.currentAssetPath) {
            const size = getCurrentSize();
            resizePaintCanvas(size.w, size.h);
            redrawMain();
          }
        }

        function createAssetLayerPixels(w, h, sourcePixels = null) {
          const px = createEmptyLayer(w, h);
          if (sourcePixels) px.set(sourcePixels.subarray(0, px.length));
          return px;
        }

        function createAssetDoc(w, h, basePixels = null) {
          const width = Math.max(1, Math.floor(Number(w) || 64));
          const height = Math.max(1, Math.floor(Number(h) || 64));
          return {
            w: width,
            h: height,
            layers: [
              {
                id: 1,
                name: "レイヤー1",
                visible: true,
                pixels: createAssetLayerPixels(width, height, basePixels),
              },
            ],
            activeLayerId: 1,
            nextLayerId: 2,
          };
        }

        function cloneAssetDoc(doc) {
          return {
            w: doc.w,
            h: doc.h,
            activeLayerId: doc.activeLayerId,
            nextLayerId: doc.nextLayerId,
            layers: doc.layers.map((l) => ({
              id: l.id,
              name: l.name,
              visible: l.visible !== false,
              pixels: new Uint8ClampedArray(l.pixels),
            })),
          };
        }

        function getCurrentAssetDoc() {
          if (app.editorMode !== "assets") return null;
          return app.assetDocMap.get(app.currentAssetPath) || null;
        }

        function getActiveAssetLayer(doc = getCurrentAssetDoc()) {
          if (!doc) return null;
          let layer = doc.layers.find((l) => l.id === doc.activeLayerId) || null;
          if (!layer && doc.layers.length) {
            doc.activeLayerId = doc.layers[doc.layers.length - 1].id;
            layer = doc.layers[doc.layers.length - 1];
          }
          return layer;
        }

        function pushAssetUndo(path) {
          const key = String(path || app.currentAssetPath || "");
          if (!key) return;
          const doc = app.assetDocMap.get(key);
          if (!doc) return;
          const u = app.assetUndoMap.get(key) || [];
          u.push(cloneAssetDoc(doc));
          if (u.length > 80) u.shift();
          app.assetUndoMap.set(key, u);
          app.assetRedoMap.set(key, []);
        }

        function compositeAssetDoc(doc) {
          const out = createEmptyLayer(doc.w, doc.h);
          for (const layer of doc.layers) {
            if (!layer || layer.visible === false) continue;
            const src = layer.pixels;
            for (let i = 0; i < out.length; i += 4) {
              const sa = src[i + 3] / 255;
              if (sa <= 0) continue;
              const da = out[i + 3] / 255;
              const oa = sa + da * (1 - sa);
              if (oa <= 0) continue;
              out[i] = Math.round((src[i] * sa + out[i] * da * (1 - sa)) / oa);
              out[i + 1] = Math.round((src[i + 1] * sa + out[i + 1] * da * (1 - sa)) / oa);
              out[i + 2] = Math.round((src[i + 2] * sa + out[i + 2] * da * (1 - sa)) / oa);
              out[i + 3] = Math.round(oa * 255);
            }
          }
          return out;
        }

        function normalizeBaseFrameName(name) {
          const n = String(name || "").trim();
          if (n.startsWith("2side_")) return n.slice(1);
          return n;
        }
        function frameNameToPath(name) {
          const base = normalizeBaseFrameName(name);
          return `assets/yansan/${base}.png`;
        }
        function expandFramesWith2Side(frames) {
          const out = [];
          (frames || []).forEach((f) => {
            const name = String(f || "").trim();
            if (!name) return;
            if (!out.includes(name)) out.push(name);
            if (name.startsWith("side_")) {
              const two = `2${name}`;
              if (!out.includes(two)) out.push(two);
            }
          });
          return out;
        }
        function skinFramePath(skin, frame) { return `assets/skin/${skin}/${frame}.png`; }
        function hasAsset(path) {
          const p = String(path || "").replace(/^\.\//, "");
          const k = p.startsWith("assets/") ? p : `assets/${p}`;
          return app.assetFiles.has(k);
        }

        function rgbaToHex(c) {
          const h = (n) => n.toString(16).padStart(2, "0");
          return `#${h(c.r)}${h(c.g)}${h(c.b)}`;
        }

        function hexToRgb(hex) {
          const s = hex.trim().replace("#", "");
          if (!/^[0-9a-fA-F]{6}$/.test(s)) return null;
          return {
            r: parseInt(s.slice(0, 2), 16),
            g: parseInt(s.slice(2, 4), 16),
            b: parseInt(s.slice(4, 6), 16),
            a: 255,
          };
        }

        function rgbToHsv(r, g, b) {
          const R = r / 255, G = g / 255, B = b / 255;
          const max = Math.max(R, G, B), min = Math.min(R, G, B);
          const d = max - min;
          let h = 0;
          if (d !== 0) {
            if (max === R) h = ((G - B) / d) % 6;
            else if (max === G) h = (B - R) / d + 2;
            else h = (R - G) / d + 4;
          }
          h = Math.round(h * 60);
          if (h < 0) h += 360;
          const s = max === 0 ? 0 : d / max;
          const v = max;
          return { h, s: Math.round(s * 100), v: Math.round(v * 100) };
        }

        function hsvToRgb(h, s, v) {
          const S = s / 100, V = v / 100;
          const c = V * S;
          const x = c * (1 - Math.abs(((h / 60) % 2) - 1));
          const m = V - c;
          let r = 0, g = 0, b = 0;
          if (h < 60) [r, g, b] = [c, x, 0];
          else if (h < 120) [r, g, b] = [x, c, 0];
          else if (h < 180) [r, g, b] = [0, c, x];
          else if (h < 240) [r, g, b] = [0, x, c];
          else if (h < 300) [r, g, b] = [x, 0, c];
          else [r, g, b] = [c, 0, x];
          return {
            r: Math.round((r + m) * 255),
            g: Math.round((g + m) * 255),
            b: Math.round((b + m) * 255),
            a: 255,
          };
        }

        async function fetchBootstrap() {
          const res = await fetch("/api/bootstrap");
          if (!res.ok) throw new Error("bootstrap failed");
          return res.json();
        }

        function openHandleDb() {
          return new Promise((resolve, reject) => {
            if (!window.indexedDB) {
              reject(new Error("indexedDB not available"));
              return;
            }
            const req = indexedDB.open(HANDLE_DB_NAME, 1);
            req.onupgradeneeded = () => {
              const db = req.result;
              if (!db.objectStoreNames.contains(HANDLE_STORE_NAME)) db.createObjectStore(HANDLE_STORE_NAME);
            };
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error || new Error("db open failed"));
          });
        }

        async function saveOutputRootHandleToDb(handle) {
          if (!handle) return;
          try {
            const db = await openHandleDb();
            await new Promise((resolve, reject) => {
              const tx = db.transaction(HANDLE_STORE_NAME, "readwrite");
              tx.objectStore(HANDLE_STORE_NAME).put(handle, HANDLE_KEY_OUTPUT_ROOT);
              tx.oncomplete = () => resolve();
              tx.onerror = () => reject(tx.error || new Error("db write failed"));
              tx.onabort = () => reject(tx.error || new Error("db write aborted"));
            });
            db.close();
          } catch (_) {}
        }

        async function loadOutputRootHandleFromDb() {
          try {
            const db = await openHandleDb();
            const handle = await new Promise((resolve, reject) => {
              const tx = db.transaction(HANDLE_STORE_NAME, "readonly");
              const req = tx.objectStore(HANDLE_STORE_NAME).get(HANDLE_KEY_OUTPUT_ROOT);
              req.onsuccess = () => resolve(req.result || null);
              req.onerror = () => reject(req.error || new Error("db read failed"));
            });
            db.close();
            return handle;
          } catch (_) {
            return null;
          }
        }

        async function resolveAssetsRootHandle(rootHandle, create) {
          if (!rootHandle || typeof rootHandle.getDirectoryHandle !== "function") return null;
          const shouldCreate = !!create;
          if (String(rootHandle.name || "").toLowerCase() === "assets") return rootHandle;
          try {
            return await rootHandle.getDirectoryHandle("assets", shouldCreate ? { create: true } : undefined);
          } catch (_) {
            return null;
          }
        }

        async function listSkinFoldersFromHandle(rootHandle) {
          const out = [];
          try {
            const assetsRoot = await resolveAssetsRootHandle(rootHandle, false);
            if (!assetsRoot) return out;
            const skinRoot = await assetsRoot.getDirectoryHandle("skin");
            for await (const [name, handle] of skinRoot.entries()) {
              if (handle && handle.kind === "directory") out.push(name);
            }
          } catch (_) {}
          out.sort();
          return out;
        }

        async function listAssetPngFilesFromHandle(rootHandle) {
          const out = [];
          try {
            const assetsRoot = await resolveAssetsRootHandle(rootHandle, false);
            if (!assetsRoot) return out;
            async function walk(dir, prefix) {
              for await (const [name, handle] of dir.entries()) {
                if (handle.kind === "directory") {
                  // eslint-disable-next-line no-await-in-loop
                  await walk(handle, `${prefix}${name}/`);
                  continue;
                }
                if (!String(name).toLowerCase().endsWith(".png")) continue;
                out.push(`assets/${prefix}${name}`);
              }
            }
            await walk(assetsRoot, "");
          } catch (_) {}
          out.sort((a, b) => a.localeCompare(b, "ja"));
          return out;
        }

          els.itemList.innerHTML = "";

        function renderLayerList() {
          if (app.editorMode !== "assets") {
            els.layerList.innerHTML = "";
            return;
          }
          const doc = getCurrentAssetDoc();
          if (!doc) {
            els.layerList.innerHTML = "";
            return;
          }

              layer.visible = layer.visible === false;

        async function deleteSkinByName(skinName) {
