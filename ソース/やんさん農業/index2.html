        async function tryRestoreOutputRootHandle() {
          if (!window.showDirectoryPicker || !window.FileSystemHandle) return false;
          const saved = await loadOutputRootHandleFromDb();
          if (!saved) return false;
          try {
            let perm = "prompt";
            if (typeof saved.queryPermission === "function") {
              perm = await saved.queryPermission({ mode: "readwrite" });
            }
            if (perm !== "granted" && typeof saved.requestPermission === "function") {
              perm = await saved.requestPermission({ mode: "readwrite" });
            }
            if (perm !== "granted") return false;
            const assetsRoot = await resolveAssetsRootHandle(saved, false);
            if (!assetsRoot) return false;
            app.outputRootHandle = assetsRoot;
            const skins = await listSkinFoldersFromHandle(assetsRoot);
            app.skins = [...new Set([...app.skins, ...skins])].sort();
            rebuildSkinSelect();
            await refreshAssetPaths();
            return true;
          } catch (_) {
            return false;
          }
        }

        async function chooseOutputRoot() {
          if (typeof window.showDirectoryPicker !== "function") {
            setStatus("このブラウザでは保存先選択APIが使えません");
            return;
          }
          try {
            const picked = await window.showDirectoryPicker({ mode: "readwrite" });
            const assetsRoot = await resolveAssetsRootHandle(picked, false);
            if (!assetsRoot) {
              setStatus("assetsフォルダ（またはassetsを含む親）を選択してください");
              return;
            }
            app.outputRootHandle = assetsRoot;
            await saveOutputRootHandleToDb(assetsRoot);
            const skins = await listSkinFoldersFromHandle(assetsRoot);
            app.skins = [...new Set([...app.skins, ...skins])].sort();
            rebuildSkinSelect();
            await refreshAssetPaths();
            els.saveCurrent.disabled = false;
            els.saveAll.disabled = false;
            setStatus("保存先を紐付けました");
          } catch (err) {
            setStatus(`保存先選択をキャンセル: ${err.message || err}`);
          }
        }

        async function loadLayerFromHandle(rootHandle, skinName, frameName) {
          try {
            const assetsRoot = await resolveAssetsRootHandle(rootHandle, false);
            if (!assetsRoot) return createEmptyLayer();
            const skinRoot = await assetsRoot.getDirectoryHandle("skin");
            const skinDir = await skinRoot.getDirectoryHandle(skinName);
            const fileHandle = await skinDir.getFileHandle(`${frameName}.png`);
            const file = await fileHandle.getFile();
            const bitmap = await createImageBitmap(file);
            const c = document.createElement("canvas");
            c.width = 64;
            c.height = 64;
            const cx = c.getContext("2d", { willReadFrequently: true });
            cx.clearRect(0, 0, 64, 64);
            cx.drawImage(bitmap, 0, 0, 64, 64);
            if (typeof bitmap.close === "function") bitmap.close();
            return new Uint8ClampedArray(cx.getImageData(0, 0, 64, 64).data);
          } catch (_) {
            return createEmptyLayer();
          }
        }

        async function saveFrameToHandle(rootHandle, skinName, frameName, dataUrl) {
          const assetsRoot = await resolveAssetsRootHandle(rootHandle, true);
          if (!assetsRoot) throw new Error("assetsフォルダが見つかりません");
          const skinRoot = await assetsRoot.getDirectoryHandle("skin", { create: true });
          const skinDir = await skinRoot.getDirectoryHandle(skinName, { create: true });
          const fileHandle = await skinDir.getFileHandle(`${frameName}.png`, { create: true });
          const writable = await fileHandle.createWritable();
          const b64 = dataUrl.slice("data:image/png;base64,".length);
          const buf = Uint8Array.from(atob(b64), (c) => c.charCodeAt(0));
          await writable.write(buf);
          await writable.close();
        }

        async function getFileHandleByAssetPath(rootHandle, assetPath, createIfMissing = false) {
          const assetsRoot = await resolveAssetsRootHandle(rootHandle, true);
          if (!assetsRoot) throw new Error("assetsフォルダが見つかりません");
          const clean = String(assetPath || "").replace(/^\.\//, "").replace(/^assets\//, "");
          if (!clean || !clean.endsWith(".png")) throw new Error("pngパスを指定してください");
          const parts = clean.split("/").filter(Boolean);
          let dir = assetsRoot;
          for (let i = 0; i < parts.length - 1; i += 1) {
            dir = await dir.getDirectoryHandle(parts[i], { create: createIfMissing });
          }
          return dir.getFileHandle(parts[parts.length - 1], { create: createIfMissing });
        }

        async function loadAssetFromHandle(rootHandle, assetPath) {
          const fileHandle = await getFileHandleByAssetPath(rootHandle, assetPath, false);
          const file = await fileHandle.getFile();
          const bitmap = await createImageBitmap(file);
          const w = Math.max(1, bitmap.width);
          const h = Math.max(1, bitmap.height);
          const c = document.createElement("canvas");
          c.width = w;
          c.height = h;
          const cx = c.getContext("2d", { willReadFrequently: true });
          cx.clearRect(0, 0, w, h);
          cx.drawImage(bitmap, 0, 0, w, h);
          if (typeof bitmap.close === "function") bitmap.close();
          return {
            w,
            h,
            data: new Uint8ClampedArray(cx.getImageData(0, 0, w, h).data),
          };
        }

        function loadAssetFromPath(assetPath) {
          return new Promise((resolve) => {
            const img = new Image();
            img.src = `${assetPath}?v=${Date.now()}`;
            img.onload = () => {
              const w = Math.max(1, img.naturalWidth || 1);
              const h = Math.max(1, img.naturalHeight || 1);
              const c = document.createElement("canvas");
              c.width = w;
              c.height = h;
              const cx = c.getContext("2d", { willReadFrequently: true });
              cx.clearRect(0, 0, w, h);
              cx.drawImage(img, 0, 0, w, h);
              resolve({
                w,
                h,
                data: new Uint8ClampedArray(cx.getImageData(0, 0, w, h).data),
              });
            };
            img.onerror = () => resolve({ w: 64, h: 64, data: createEmptyLayer(64, 64) });
          });
        }

        async function saveAssetToHandle(rootHandle, assetPath, dataUrl) {
          const fileHandle = await getFileHandleByAssetPath(rootHandle, assetPath, true);
          const writable = await fileHandle.createWritable();
          const b64 = dataUrl.slice("data:image/png;base64,".length);
          const buf = Uint8Array.from(atob(b64), (c) => c.charCodeAt(0));
          await writable.write(buf);
          await writable.close();
        }

        function offlineBootstrap() {
          const assetFiles = new Set();
          DEFAULT_FRAMES.forEach((f) => {
            assetFiles.add(`assets/yansan/${normalizeBaseFrameName(f)}.png`);
          });
          assetFiles.add("assets/sickle.png");
          return {
            frames: [...DEFAULT_FRAMES],
            skins: [],
            assetFiles: [...assetFiles],
          };
        }

        function createEmptyLayer(w = 64, h = 64) {
          const width = Math.max(1, Math.floor(Number(w) || 64));
          const height = Math.max(1, Math.floor(Number(h) || 64));
          return new Uint8ClampedArray(width * height * 4);
        }

        function pushUndo(key) {
          if (app.editorMode === "assets") {
            pushAssetUndo(key);
            return;
          }
          const undoMap = getActiveUndoMap();
          const layerMap = getActiveLayerMap();
          const u = undoMap.get(key) || [];
          const layer = layerMap.get(key) || createEmptyLayer(getCurrentSize().w, getCurrentSize().h);
          u.push(new Uint8ClampedArray(layer));
          if (u.length > 40) u.shift();
          undoMap.set(key, u);
          getActiveRedoMap().set(key, []);
        }

        function readPixel(layer, x, y) {
          const { w } = getCurrentSize();
          const i = (y * w + x) * 4;
          return { r: layer[i], g: layer[i + 1], b: layer[i + 2], a: layer[i + 3] };
        }

        function writePixel(layer, x, y, c) {
          const { w } = getCurrentSize();
          const i = (y * w + x) * 4;
          layer[i] = c.r;
          layer[i + 1] = c.g;
          layer[i + 2] = c.b;
          layer[i + 3] = c.a;
        }

        function sameColor(a, b) {
          return a.r === b.r && a.g === b.g && a.b === b.b && a.a === b.a;
        }

        function floodFill(layer, sx, sy, color) {
          const { w, h } = getCurrentSize();
          if (sx < 0 || sy < 0 || sx >= w || sy >= h) return;
          const target = readPixel(layer, sx, sy);
          if (sameColor(target, color)) return;
          const q = [[sx, sy]];
          const seen = new Uint8Array(w * h);
          while (q.length) {
            const [x, y] = q.pop();
            const idx = y * w + x;
            if (seen[idx]) continue;
            seen[idx] = 1;
            const current = readPixel(layer, x, y);
            if (!sameColor(current, target)) continue;
            writePixel(layer, x, y, color);
            if (x > 0) q.push([x - 1, y]);
            if (x < w - 1) q.push([x + 1, y]);
            if (y > 0) q.push([x, y - 1]);
            if (y < h - 1) q.push([x, y + 1]);
          }
        }

        function currentLayer() {
          if (app.editorMode === "assets") {
            const doc = getCurrentAssetDoc();
            const active = getActiveAssetLayer(doc);
            if (active) return active.pixels;
            const size = getCurrentSize();
            return createEmptyLayer(size.w, size.h);
          }
          const key = getCurrentKey();
          const map = getActiveLayerMap();
          if (!map.has(key)) {
            const { w, h } = getCurrentSize();
            map.set(key, createEmptyLayer(w, h));
          }
          return map.get(key);
        }

        function cloneLayerMap(srcMap) {
          const out = new Map();
          for (const frame of app.frames) {
            const layer = (srcMap && srcMap.get(frame)) || createEmptyLayer();
            out.set(frame, new Uint8ClampedArray(layer));
          }
          return out;
        }

        function saveCurrentSkinDraft() {
          const name = String(app.skinName || "").trim();
          if (!name || !app.frames.length) return;
          app.skinDrafts.set(name, cloneLayerMap(app.layerMap));
        }

        function mapToSerializableLayers(layerMap) {
          const out = {};
          for (const frame of app.frames) {
            const layer = (layerMap && layerMap.get(frame)) || createEmptyLayer();
            out[frame] = new Uint8ClampedArray(layer);
          }
          return out;
        }

        function serializableLayersToMap(obj) {
          const out = new Map();
          for (const frame of app.frames) {
            const layer = (obj && obj[frame]) || createEmptyLayer();
            out.set(frame, new Uint8ClampedArray(layer));
          }
          return out;
        }

        function layerDataToPngDataUrl(layer) {
          const c = document.createElement("canvas");
          c.width = 64;
          c.height = 64;
          const cx = c.getContext("2d");
          cx.putImageData(new ImageData(new Uint8ClampedArray(layer), 64, 64), 0, 0);
          return c.toDataURL("image/png");
        }

        async function writeSkinFolderFromRecord(record) {
          if (!app.offlineMode || !app.outputRootHandle) return;
          if (!record || !record.layers) return;
          const skinName = String(record.name || "").trim();
          if (!skinName) return;
          for (const frame of app.frames) {
            const layer = record.layers[frame] || createEmptyLayer();
            const dataUrl = layerDataToPngDataUrl(layer);
            // eslint-disable-next-line no-await-in-loop
            await saveFrameToHandle(app.outputRootHandle, skinName, frame, dataUrl);
          }
        }

        async function removeSkinFolderIfPossible(skinName) {
          if (!app.offlineMode || !app.outputRootHandle) return false;
          try {
            const assetsRoot = await resolveAssetsRootHandle(app.outputRootHandle, false);
            if (!assetsRoot) return false;
            const skinRoot = await assetsRoot.getDirectoryHandle("skin");
            await skinRoot.removeEntry(skinName, { recursive: true });
            return true;
          } catch (_) {
            return false;
          }
        }

        function buildDeleteRecord(skinName) {
          const name = String(skinName || "").trim();
          const index = app.skins.indexOf(name);
          const draft = app.skinDrafts.get(name);
          return {
            type: "delete_skin",
            name,
            index: index < 0 ? app.skins.length : index,
            wasActive: app.skinName === name,
            prevActive: app.skinName,
            layers: draft ? mapToSerializableLayers(draft) : null,
            removedOnDisk: false,
          };
        }

        async function applyDeleteRecord(record, pushUndo) {
          if (!record || !record.name) return false;
          const beforeActive = app.skinName;
          saveCurrentSkinDraft();
          record.removedOnDisk = await removeSkinFolderIfPossible(record.name);
          app.skins = app.skins.filter((s) => s !== record.name);
          app.skinDrafts.delete(record.name);
          if (!app.skins.length) {
            app.skinName = "new_item";
            els.skinName.value = app.skinName;
            for (const f of app.frames) {
              app.layerMap.set(f, createEmptyLayer());
              app.undoMap.set(f, []);
              app.redoMap.set(f, []);
            }
            await redrawMain();
          } else {
            if (app.skinName === record.name) app.skinName = app.skins[0];
            els.skinName.value = app.skinName;
            await loadSkinFrames(app.skinName, beforeActive);
          }
          rebuildSkinSelect();
          if (pushUndo) {
            app.skinDeleteUndoStack.push(record);
            app.skinDeleteRedoStack = [];
          }
          setStatus(`削除: ${record.name}`);
          return true;
        }

        async function undoSkinDelete() {
          const record = app.skinDeleteUndoStack.pop();
          if (!record) return false;
          const beforeActive = app.skinName;
          const insertAt = Math.max(0, Math.min(record.index, app.skins.length));
          app.skins.splice(insertAt, 0, record.name);
          if (record.layers) app.skinDrafts.set(record.name, serializableLayersToMap(record.layers));
          if (record.removedOnDisk && record.layers) await writeSkinFolderFromRecord(record);
          const target = record.wasActive ? record.name : (record.prevActive || app.skinName || record.name);
          app.skinName = app.skins.includes(target) ? target : record.name;
          els.skinName.value = app.skinName;
          rebuildSkinSelect();
          await loadSkinFrames(app.skinName, beforeActive);
          app.skinDeleteRedoStack.push(record);
          setStatus(`削除を戻しました: ${record.name}`);
          return true;
        }

        async function redoSkinDelete() {
          const record = app.skinDeleteRedoStack.pop();
          if (!record) return false;
          await applyDeleteRecord(record, false);
          app.skinDeleteUndoStack.push(record);
          setStatus(`削除をやり直しました: ${record.name}`);
          return true;
        }

        function clearLayer(layer) {
          layer.fill(0);
        }

        function applyMovedLayer(snapshot, dx, dy) {
          const layer = currentLayer();
          const { w, h } = getCurrentSize();
          clearLayer(layer);
          for (let y = 0; y < h; y += 1) {
            for (let x = 0; x < w; x += 1) {
              const sx = x - dx;
              const sy = y - dy;
              if (sx < 0 || sy < 0 || sx >= w || sy >= h) continue;
              const si = (sy * w + sx) * 4;
              const di = (y * w + x) * 4;
              layer[di] = snapshot[si];
              layer[di + 1] = snapshot[si + 1];
              layer[di + 2] = snapshot[si + 2];
              layer[di + 3] = snapshot[si + 3];
            }
          }
        }

        function flipLayerHorizontal(layer) {
          const { w, h } = getCurrentSize();
          const src = new Uint8ClampedArray(layer);
          for (let y = 0; y < h; y += 1) {
            for (let x = 0; x < w; x += 1) {
              const si = (y * w + x) * 4;
              const di = (y * w + (w - 1 - x)) * 4;
              layer[di] = src[si];
              layer[di + 1] = src[si + 1];
              layer[di + 2] = src[si + 2];
              layer[di + 3] = src[si + 3];
            }
          }
        }

        function flipLayerVertical(layer) {
          const { w, h } = getCurrentSize();
          const src = new Uint8ClampedArray(layer);
          for (let y = 0; y < h; y += 1) {
            for (let x = 0; x < w; x += 1) {
              const si = (y * w + x) * 4;
              const di = ((h - 1 - y) * w + x) * 4;
              layer[di] = src[si];
              layer[di + 1] = src[si + 1];
              layer[di + 2] = src[si + 2];
              layer[di + 3] = src[si + 3];
            }
          }
        }

        function drawComposedTo(ctx, frame, w, h) {
          if (app.editorMode === "assets") {
            const doc = getCurrentAssetDoc();
            const layer = doc ? compositeAssetDoc(doc) : createEmptyLayer(w, h);
            ctx.clearRect(0, 0, w, h);
            const id = new ImageData(new Uint8ClampedArray(layer), w, h);
            const temp = document.createElement("canvas");
            temp.width = w;
            temp.height = h;
            temp.getContext("2d").putImageData(id, 0, 0);
            ctx.drawImage(temp, 0, 0, w, h);
            return Promise.resolve();
          }
          const base = new Image();
          base.src = frameNameToPath(frame);
          const layer = app.layerMap.get(frame) || createEmptyLayer(64, 64);
          return new Promise((resolve) => {
            base.onload = () => {
              ctx.clearRect(0, 0, w, h);
              ctx.globalAlpha = 0.45;
              ctx.drawImage(base, 0, 0, w, h);
              ctx.globalAlpha = 1;
              const id = new ImageData(new Uint8ClampedArray(layer), 64, 64);
              const temp = document.createElement("canvas");
              temp.width = 64;
              temp.height = 64;
              temp.getContext("2d").putImageData(id, 0, 0);
              ctx.drawImage(temp, 0, 0, w, h);
              resolve();
            };
            base.onerror = () => {
              ctx.clearRect(0, 0, w, h);
              resolve();
            };
          });
        }

        async function redrawMain() {
          const { w, h } = getCurrentSize();
          await drawComposedTo(paintCtx, app.currentFrame, w, h);
          if (app.editorMode === "skin") {
            await redrawThumbs();
            els.frameInfo.textContent = `Frame: ${app.currentFrame}`;
          } else {
            els.frameInfo.textContent = `Asset: ${app.currentAssetPath || "-"} (${w}x${h})`;
            renderLayerList();
          }
        }

        async function redrawThumbs() {
          const nodes = [...els.thumbs.querySelectorAll(".thumb")];
          for (const n of nodes) {
            const frame = n.dataset.frame;
            const c = n.querySelector("canvas");
            const cx = c.getContext("2d");
            await drawComposedTo(cx, frame, 64, 64);
            n.classList.toggle("active", frame === app.currentFrame);
          }
        }

        function renderPalette(container, colors, selectedHex, onPick) {
          container.innerHTML = "";
          colors.forEach((color) => {
            const b = document.createElement("button");
            b.className = "swatch" + (color === "transparent" ? " transparent" : "");
            if (color !== "transparent") b.style.background = color;
            if (color === selectedHex || (color === "transparent" && app.tool === "erase")) b.classList.add("selected");
            b.type = "button";
            b.addEventListener("click", () => onPick(color));
            container.appendChild(b);
          });
        }

        function drawHueCanvas() {
          const g = hueCtx.createLinearGradient(0, 0, 0, 180);
          g.addColorStop(0 / 6, "#ff0000");
          g.addColorStop(1 / 6, "#ffff00");
          g.addColorStop(2 / 6, "#00ff00");
          g.addColorStop(3 / 6, "#00ffff");
          g.addColorStop(4 / 6, "#0000ff");
          g.addColorStop(5 / 6, "#ff00ff");
          g.addColorStop(1, "#ff0000");
          hueCtx.fillStyle = g;
          hueCtx.fillRect(0, 0, 34, 180);
        }

        function drawSVCanvas() {
          const rgb = hsvToRgb(app.hsv.h, 100, 100);
          svCtx.fillStyle = `rgb(${rgb.r},${rgb.g},${rgb.b})`;
          svCtx.fillRect(0, 0, 180, 180);
          const white = svCtx.createLinearGradient(0, 0, 180, 0);
          white.addColorStop(0, "#fff");
          white.addColorStop(1, "rgba(255,255,255,0)");
          svCtx.fillStyle = white;
          svCtx.fillRect(0, 0, 180, 180);
          const black = svCtx.createLinearGradient(0, 0, 0, 180);
          black.addColorStop(0, "rgba(0,0,0,0)");
          black.addColorStop(1, "#000");
          svCtx.fillStyle = black;
          svCtx.fillRect(0, 0, 180, 180);
        }

        function applyCurrentColorFromHSV() {
          app.selectedColor = hsvToRgb(app.hsv.h, app.hsv.s, app.hsv.v);
          els.hexInput.value = rgbaToHex(app.selectedColor);
          app.tool = app.tool === "erase" ? "pen" : app.tool;
          renderPalettes();
        }

        function renderPalettes() {
          const hex = rgbaToHex(app.selectedColor);
          renderPalette(els.basePalette, BASE_PALETTE, hex, (c) => {
            const rgb = hexToRgb(c);
            if (rgb) {
              app.selectedColor = rgb;
              app.hsv = rgbToHsv(rgb.r, rgb.g, rgb.b);
              els.hexInput.value = c;
              app.tool = "pen";
              drawSVCanvas();
              renderPalettes();
            }
          });
          renderPalette(els.favPalette, app.favorites, hex, (c) => {
            const rgb = hexToRgb(c);
            if (rgb) {
              app.selectedColor = rgb;
              app.hsv = rgbToHsv(rgb.r, rgb.g, rgb.b);
              els.hexInput.value = c;
              app.tool = "pen";
              drawSVCanvas();
              renderPalettes();
            }
          });
          renderPalette(els.itemPalette, app.itemColors.length ? app.itemColors : ["transparent"], hex, (c) => {
            if (c === "transparent") {
              app.eyedropTemp = false;
              app.tool = "erase";
            } else {
              const rgb = hexToRgb(c);
              if (rgb) {
                app.selectedColor = rgb;
                app.hsv = rgbToHsv(rgb.r, rgb.g, rgb.b);
                els.hexInput.value = c;
                app.eyedropTemp = false;
                app.tool = "pen";
              }
            }
            drawSVCanvas();
            renderPalettes();
          });
          refreshToolUI();
        }

        async function extractItemColors(itemName) {
          const sources = [];
          const single = `assets/${itemName}.png`;
          sources.push(single);
          app.frames.forEach((f) => sources.push(`assets/${itemName}/${f}.png`));
          app.frames.forEach((f) => {
            if (f.startsWith("side_")) sources.push(`assets/${itemName}/2${f}.png`);
          });

          const set = new Set();
          for (const src of sources) {
            if (!hasAsset(src)) continue;
            // eslint-disable-next-line no-await-in-loop
            const colors = await extractColorsFromImage(src);
            colors.forEach((c) => set.add(c));
          }
          const arr = [...set].slice(0, 80);
          app.itemColors = arr;
          renderPalettes();
        }

        function extractColorsFromImage(src) {
          return new Promise((resolve) => {
            const img = new Image();
            img.src = src + `?v=${Date.now()}`;
            img.onload = () => {
              const c = document.createElement("canvas");
              c.width = img.naturalWidth;
              c.height = img.naturalHeight;
              const cx = c.getContext("2d", { willReadFrequently: true });
              try {
                cx.drawImage(img, 0, 0);
                const d = cx.getImageData(0, 0, c.width, c.height).data;
                const colors = new Set();
                for (let i = 0; i < d.length; i += 4) {
                  const a = d[i + 3];
                  if (a === 0) continue;
                  const hex = `#${d[i].toString(16).padStart(2, "0")}${d[i + 1].toString(16).padStart(2, "0")}${d[i + 2].toString(16).padStart(2, "0")}`;
                  colors.add(hex);
                }
                resolve([...colors]);
              } catch (_) {
                resolve([]);
              }
            };
            img.onerror = () => resolve([]);
          });
        }

        function pointerToPixel(event) {
          const rect = els.paintCanvas.getBoundingClientRect();
          const { w, h } = getCurrentSize();
          const x = Math.floor(((event.clientX - rect.left) / rect.width) * w);
          const y = Math.floor(((event.clientY - rect.top) / rect.height) * h);
          return { x: Math.max(0, Math.min(w - 1, x)), y: Math.max(0, Math.min(h - 1, y)) };
        }

        function pickColorAt(event) {
          const { x, y } = pointerToPixel(event);
          const layer = currentLayer();
          const p = readPixel(layer, x, y);
          if (p.a > 0) {
            app.eyedropTransparentHit = false;
            app.selectedColor = p;
            app.hsv = rgbToHsv(p.r, p.g, p.b);
            els.hexInput.value = rgbaToHex(p);
            app.tool = "pen";
            setStatus(`色を取得: ${els.hexInput.value}`);
            return;
          }
          try {
            const raw = paintCtx.getImageData(x, y, 1, 1).data;
            if (raw && raw[3] > 0) {
              app.eyedropTransparentHit = false;
              const c = { r: raw[0], g: raw[1], b: raw[2], a: 255 };
              app.selectedColor = c;
              app.hsv = rgbToHsv(c.r, c.g, c.b);
              els.hexInput.value = rgbaToHex(c);
              app.tool = "pen";
              setStatus(`色を取得: ${els.hexInput.value}`);
              return;
            }
          } catch (_) {}
          app.eyedropTransparentHit = true;
          app.tool = "erase";
          setStatus("透明を取得: 消しゴムに切替");
        }

        async function paintAt(event, first) {
          const { x, y } = pointerToPixel(event);
          const layer = currentLayer();
          if (first) pushUndo(getCurrentKey());

          if (app.eyedropTemp) {
            pickColorAt(event);
            renderPalettes();
            drawSVCanvas();
            await redrawMain();
            return;
          }

          if (app.tool === "fill") {
            const c = app.tool === "erase" ? { r: 0, g: 0, b: 0, a: 0 } : app.selectedColor;
            floodFill(layer, x, y, c);
          } else {
            const c = app.tool === "erase" ? { r: 0, g: 0, b: 0, a: 0 } : app.selectedColor;
            writePixel(layer, x, y, c);
          }

          await redrawMain();
        }

        async function loadSkinFrames(skinName, previousSkinName = app.skinName) {
          if (app.loaded && previousSkinName) {
            app.skinDrafts.set(previousSkinName, cloneLayerMap(app.layerMap));
          }
          app.skinName = skinName;
          els.skinName.value = skinName;
          app.layerMap.clear();
          app.undoMap.clear();
          app.redoMap.clear();

          if (app.skinDrafts.has(skinName)) {
            app.layerMap = cloneLayerMap(app.skinDrafts.get(skinName));
            for (const frame of app.frames) {
              app.undoMap.set(frame, []);
              app.redoMap.set(frame, []);
            }
            await extractItemColors(skinName);
            await redrawMain();
            setStatus(`読み込み(保持): ${skinName}`);
            return;
          }

          for (const frame of app.frames) {
            let layer = createEmptyLayer();
            if (app.offlineMode && app.outputRootHandle) {
              // eslint-disable-next-line no-await-in-loop
              layer = await loadLayerFromHandle(app.outputRootHandle, skinName, frame);
            } else {
              const p = skinFramePath(skinName, frame);
              // eslint-disable-next-line no-await-in-loop
              layer = hasAsset(p) ? await loadLayerFromPath(p) : createEmptyLayer();
            }
            app.layerMap.set(frame, layer);
            app.undoMap.set(frame, []);
            app.redoMap.set(frame, []);
          }
          app.skinDrafts.set(skinName, cloneLayerMap(app.layerMap));
          await extractItemColors(skinName);
          await redrawMain();
          setStatus(`読み込み: ${skinName}`);
        }

        async function refreshAssetPaths() {
          const fromBoot = [...app.assetFiles].filter((p) => String(p).toLowerCase().endsWith(".png"));
          const set = new Set(fromBoot.map((p) => String(p).replace(/^\.\//, "")));
          if (app.offlineMode && app.outputRootHandle) {
            const scanned = await listAssetPngFilesFromHandle(app.outputRootHandle);
            scanned.forEach((p) => set.add(p));
          }
          app.assetPaths = [...set].sort((a, b) => a.localeCompare(b, "ja"));
          rebuildAssetList();
        }

        async function openAssetForEdit(assetPath) {
          const path = String(assetPath || "").replace(/^\.\//, "");
          if (!path) return;
          const existing = app.assetDocMap.get(path);
          if (existing) {
            app.currentAssetPath = path;
            resizePaintCanvas(existing.w, existing.h);
            els.assetPath.value = path.replace(/^assets\//, "");
            rebuildAssetList();
            await redrawMain();
            setStatus(`編集(保持): ${path} (${existing.w}x${existing.h})`);
            return;
          }
          let loaded = null;
          if (app.offlineMode && app.outputRootHandle) {
            try {
              loaded = await loadAssetFromHandle(app.outputRootHandle, path);
            } catch (_) {
              loaded = null;
            }
          }
          if (!loaded) loaded = await loadAssetFromPath(path);
          app.currentAssetPath = path;
          app.assetDocMap.set(path, createAssetDoc(loaded.w, loaded.h, loaded.data));
          app.assetUndoMap.set(path, []);
          app.assetRedoMap.set(path, []);
          resizePaintCanvas(loaded.w, loaded.h);
          els.assetPath.value = path.replace(/^assets\//, "");
          rebuildAssetList();
          await redrawMain();
          setStatus(`編集: ${path} (${loaded.w}x${loaded.h})`);
        }

        async function createNewAsset() {
          const rel = String(els.assetPath.value || "").trim().replace(/^assets\//, "");
          if (!rel) {
            setStatus("新規画像パスを入力してください");
            return;
          }
          const path = `assets/${rel.endsWith(".png") ? rel : `${rel}.png`}`;
          const w = Math.max(1, Math.min(2048, Math.floor(Number(els.assetWidth.value) || 64)));
          const h = Math.max(1, Math.min(2048, Math.floor(Number(els.assetHeight.value) || 64)));
          app.assetDocMap.set(path, createAssetDoc(w, h, null));
          app.assetUndoMap.set(path, []);
          app.assetRedoMap.set(path, []);
          if (!app.assetPaths.includes(path)) app.assetPaths.push(path);
          app.assetPaths.sort((a, b) => a.localeCompare(b, "ja"));
          app.currentAssetPath = path;
          resizePaintCanvas(w, h);
          rebuildAssetList();
          await redrawMain();
          setStatus(`新規画像を作成: ${path} (${w}x${h})`);
        }

        async function resizeCurrentAsset() {
          if (app.editorMode !== "assets" || !app.currentAssetPath) return;
          const doc = getCurrentAssetDoc();
          if (!doc) return;
          const oldSize = { w: doc.w, h: doc.h };
          const newW = Math.max(1, Math.min(2048, Math.floor(Number(els.assetWidth.value) || oldSize.w)));
          const newH = Math.max(1, Math.min(2048, Math.floor(Number(els.assetHeight.value) || oldSize.h)));
          if (newW === oldSize.w && newH === oldSize.h) return;
          pushAssetUndo(app.currentAssetPath);
          for (const layer of doc.layers) {
            const old = layer.pixels;
            const next = createEmptyLayer(newW, newH);
            const copyW = Math.min(oldSize.w, newW);
            const copyH = Math.min(oldSize.h, newH);
            for (let y = 0; y < copyH; y += 1) {
              for (let x = 0; x < copyW; x += 1) {
                const si = (y * oldSize.w + x) * 4;
                const di = (y * newW + x) * 4;
                next[di] = old[si];
                next[di + 1] = old[si + 1];
                next[di + 2] = old[si + 2];
                next[di + 3] = old[si + 3];
              }
            }
            layer.pixels = next;
          }
          doc.w = newW;
          doc.h = newH;
          app.assetUndoMap.set(app.currentAssetPath, []);
          app.assetRedoMap.set(app.currentAssetPath, []);
          resizePaintCanvas(newW, newH);
          await redrawMain();
          setStatus(`サイズ変更: ${newW}x${newH}`);
        }

        async function addBlankLayerToCurrentAsset() {
          const doc = getCurrentAssetDoc();
          if (!doc) return;
          pushAssetUndo(app.currentAssetPath);
          const id = doc.nextLayerId++;
          doc.layers.push({
            id,
            name: `レイヤー${id}`,
            visible: true,
            pixels: createEmptyLayer(doc.w, doc.h),
          });
          doc.activeLayerId = id;
          await redrawMain();
          setStatus("レイヤーを追加しました");
        }

        async function deleteCurrentAssetLayer() {
          const doc = getCurrentAssetDoc();
          if (!doc) return;
          if (doc.layers.length <= 1) {
            setStatus("最後の1レイヤーは削除できません");
            return;
          }
          pushAssetUndo(app.currentAssetPath);
          const idx = doc.layers.findIndex((l) => l.id === doc.activeLayerId);
          if (idx < 0) return;
          doc.layers.splice(idx, 1);
          const next = doc.layers[Math.max(0, idx - 1)] || doc.layers[0];
          doc.activeLayerId = next.id;
          await redrawMain();
          setStatus("レイヤーを削除しました");
        }

        function loadLayerFromPath(path) {
          return new Promise((resolve) => {
            const img = new Image();
            img.src = `${path}?v=${Date.now()}`;
            img.onload = () => {
              const c = document.createElement("canvas");
              c.width = 64;
              c.height = 64;
              const cx = c.getContext("2d", { willReadFrequently: true });
              cx.clearRect(0, 0, 64, 64);
              cx.drawImage(img, 0, 0, 64, 64);
              resolve(new Uint8ClampedArray(cx.getImageData(0, 0, 64, 64).data));
            };
            img.onerror = () => resolve(createEmptyLayer());
          });
        }

        function layerToPngDataUrl(frame) {
          let w;
          let h;
          let layer;
          if (app.editorMode === "assets") {
            const doc = getCurrentAssetDoc();
            if (doc) {
              w = doc.w;
              h = doc.h;
              layer = compositeAssetDoc(doc);
            } else {
              const size = getCurrentSize();
              w = size.w;
              h = size.h;
              layer = createEmptyLayer(w, h);
            }
          } else {
            const size = getCurrentSize();
            w = size.w;
            h = size.h;
            const map = getActiveLayerMap();
            layer = map.get(frame) || createEmptyLayer(w, h);
          }
          const c = document.createElement("canvas");
          c.width = w;
          c.height = h;
          const cx = c.getContext("2d");
          cx.putImageData(new ImageData(new Uint8ClampedArray(layer), w, h), 0, 0);
          return c.toDataURL("image/png");
        }

        function isTypingElement(target) {
          if (!target) return false;
          const tag = String(target.tagName || "").toLowerCase();
          return tag === "input" || tag === "textarea" || target.isContentEditable === true;
        }

        async function copyCurrentFrame() {
          const layer = currentLayer();
          const size = getCurrentSize();
          app.clipboardLayer = {
            w: size.w,
            h: size.h,
            data: new Uint8ClampedArray(layer),
          };
          if (app.editorMode === "assets") {
            const doc = getCurrentAssetDoc();
            if (doc) {
              pushAssetUndo(app.currentAssetPath);
              const nextId = doc.nextLayerId++;
              doc.layers.push({
                id: nextId,
                name: `レイヤー${nextId}`,
                visible: true,
                pixels: new Uint8ClampedArray(layer),
              });
              doc.activeLayerId = nextId;
              await redrawMain();
              setStatus("コピーして新規レイヤーを追加しました");
              return;
            }
          }
          setStatus("コピーしました");
        }

        async function pasteToCurrentFrame() {
          if (app.clipboardLayer) {
            if (app.editorMode === "assets" && app.currentAssetPath) {
              const doc = getCurrentAssetDoc();
              if (doc) {
                pushAssetUndo(app.currentAssetPath);
                const nextId = doc.nextLayerId++;
                const nextPixels = createEmptyLayer(doc.w, doc.h);
                const copyW = Math.min(doc.w, app.clipboardLayer.w);
                const copyH = Math.min(doc.h, app.clipboardLayer.h);
                for (let y = 0; y < copyH; y += 1) {
                  for (let x = 0; x < copyW; x += 1) {
                    const si = (y * app.clipboardLayer.w + x) * 4;
                    const di = (y * doc.w + x) * 4;
                    nextPixels[di] = app.clipboardLayer.data[si];
                    nextPixels[di + 1] = app.clipboardLayer.data[si + 1];
                    nextPixels[di + 2] = app.clipboardLayer.data[si + 2];
                    nextPixels[di + 3] = app.clipboardLayer.data[si + 3];
                  }
                }
                doc.layers.push({
                  id: nextId,
                  name: `レイヤー${nextId}`,
                  visible: true,
                  pixels: nextPixels,
                });
                doc.activeLayerId = nextId;
                await redrawMain();
                setStatus("貼り付けして新規レイヤーを追加しました");
                return;
              }
            } else {
              const key = getCurrentKey();
              const map = getActiveLayerMap();
              pushUndo(key);
              map.set(key, new Uint8ClampedArray(app.clipboardLayer.data));
              await redrawMain();
              setStatus("貼り付けました");
              return;
            }
          }
          if (!app.clipboardLayer) {
            setStatus("貼り付けできるデータがありません");
            return;
          }
        }

        async function saveFrame(frame) {
          if (app.editorMode === "assets") {
            if (!app.currentAssetPath) throw new Error("保存対象の画像がありません");
            if (!app.offlineMode || !app.outputRootHandle) {
              throw new Error("assets編集の保存は file:// + 保存先紐付け時のみ対応です");
            }
            const dataUrl = layerToPngDataUrl(app.currentAssetPath);
            await saveAssetToHandle(app.outputRootHandle, app.currentAssetPath, dataUrl);
            if (!app.assetFiles.has(app.currentAssetPath)) app.assetFiles.add(app.currentAssetPath);
            return;
          }
          if (app.offlineMode) {
            if (!app.outputRootHandle) throw new Error("先に「保存先選択(file://)」を実行してください");
            const skin = (els.skinName.value || "default_skin").trim();
            const dataUrl = layerToPngDataUrl(frame);
            await saveFrameToHandle(app.outputRootHandle, skin, frame, dataUrl);
            return;
          }
          const skin = (els.skinName.value || "default_skin").trim();
          if (!skin) return;
          const dataUrl = layerToPngDataUrl(frame);
          const res = await fetch("/api/save-skin", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ skinName: skin, frameName: frame, dataUrl }),
          });
          if (!res.ok) throw new Error(`save failed: ${frame}`);
        }

        async function init() {
          loadFavoritesFromStorage();
          drawHueCanvas();
          drawSVCanvas();
          renderPalettes();

          let boot;
          let restored = false;
          if (location.protocol === "file:") {
            app.offlineMode = true;
            boot = offlineBootstrap();
          } else {
            boot = await fetchBootstrap();
          }
          app.frames = expandFramesWith2Side(boot.frames);
          app.skins = boot.skins;
          app.assetFiles = new Set((boot.assetFiles || []).map((p) => String(p).replace(/^\.\//, "")));

          if (app.offlineMode) {
            restored = await tryRestoreOutputRootHandle();
            els.saveCurrent.disabled = !restored;
            els.saveAll.disabled = !restored;
            setStatus(restored
              ? "file://モード: 保存先権限を復元しました。保存できます。"
              : "file://モード: 先に「保存先選択(file://)」で権限を紐付けてください。");
          }
          await refreshAssetPaths();

          app.currentFrame = app.frames[0];
          if (app.skins.length) {
            app.skinName = app.skins[0];
          } else {
            app.skinName = "sickle";
          }

          els.skinName.value = app.skinName;
          rebuildSkinSelect();
          setEditorMode("skin");
          resizePaintCanvas(64, 64);

          els.thumbs.innerHTML = "";
          for (const frame of app.frames) {
            const d = document.createElement("div");
            d.className = "thumb";
            d.dataset.frame = frame;
            d.innerHTML = `<canvas width=64 height=64></canvas><div class=small>${frame}</div>`;
            d.addEventListener("click", async () => {
              app.currentFrame = frame;
              await redrawMain();
            });
            els.thumbs.appendChild(d);
          }

          await loadSkinFrames(app.skinName);
          app.loaded = true;
        }

        els.modeSkin.addEventListener("click", () => {
          setEditorMode("skin");
        });
        els.modeAssets.addEventListener("click", async () => {
          setEditorMode("assets");
          await refreshAssetPaths();
          if (!app.currentAssetPath && app.assetPaths.length) {
            await openAssetForEdit(app.assetPaths[0]);
          } else {
            await redrawMain();
          }
        });
        els.createAsset.addEventListener("click", async () => {
          await createNewAsset();
        });
        els.resizeAsset.addEventListener("click", async () => {
          await resizeCurrentAsset();
        });
        els.addLayerBtn.addEventListener("click", async () => {
          await addBlankLayerToCurrentAsset();
        });
        els.deleteLayerBtn.addEventListener("click", async () => {
          await deleteCurrentAssetLayer();
        });

        els.toolPen.addEventListener("click", () => { setTool("pen"); });
        els.toolFill.addEventListener("click", () => { setTool("fill"); });
        els.toolErase.addEventListener("click", () => { setTool("erase"); });

        async function doUndo() {
          if (app.editorMode === "assets") {
            const key = app.currentAssetPath;
            const u = app.assetUndoMap.get(key) || [];
            if (!u.length) return false;
            const r = app.assetRedoMap.get(key) || [];
            const current = app.assetDocMap.get(key);
            if (current) r.push(cloneAssetDoc(current));
            app.assetRedoMap.set(key, r);
            app.assetDocMap.set(key, u.pop());
            const size = getCurrentSize();
            resizePaintCanvas(size.w, size.h);
            await redrawMain();
            return true;
          }
          const key = getCurrentKey();
          const layerMap = getActiveLayerMap();
          const undoMap = getActiveUndoMap();
          const redoMap = getActiveRedoMap();
          const u = undoMap.get(key) || [];
          if (u.length) {
            const r = redoMap.get(key) || [];
            r.push(new Uint8ClampedArray(currentLayer()));
            redoMap.set(key, r);
            layerMap.set(key, u.pop());
            await redrawMain();
            return true;
          }
          return undoSkinDelete();
        }

        async function doRedo() {
          if (app.editorMode === "assets") {
            const key = app.currentAssetPath;
            const r = app.assetRedoMap.get(key) || [];
            if (!r.length) return false;
            const u = app.assetUndoMap.get(key) || [];
            const current = app.assetDocMap.get(key);
            if (current) u.push(cloneAssetDoc(current));
            app.assetUndoMap.set(key, u);
            app.assetDocMap.set(key, r.pop());
            const size = getCurrentSize();
            resizePaintCanvas(size.w, size.h);
            await redrawMain();
            return true;
          }
          const key = getCurrentKey();
          const layerMap = getActiveLayerMap();
          const undoMap = getActiveUndoMap();
          const redoMap = getActiveRedoMap();
          const r = redoMap.get(key) || [];
          if (r.length) {
            const u = undoMap.get(key) || [];
            u.push(new Uint8ClampedArray(currentLayer()));
            undoMap.set(key, u);
            layerMap.set(key, r.pop());
            await redrawMain();
            return true;
          }
          return redoSkinDelete();
        }

        els.undoBtn.addEventListener("click", async () => {
          await doUndo();
        });

        els.redoBtn.addEventListener("click", async () => {
          await doRedo();
        });

        window.addEventListener("keydown", async (e) => {
          const cmd = e.metaKey || e.ctrlKey;
          const key = e.key.toLowerCase();
          if (cmd && key === "z" && !e.shiftKey) {
            e.preventDefault();
            await doUndo();
            return;
          }
          if (cmd && ((key === "z" && e.shiftKey) || key === "y")) {
            e.preventDefault();
            await doRedo();
            return;
          }
          if (cmd && key === "a") {
            e.preventDefault();
            app.selectionAll = true;
            setStatus("全選択");
            return;
          }
          if (cmd && key === "c") {
            e.preventDefault();
            await copyCurrentFrame();
            return;
          }
          if (cmd && key === "v") {
            e.preventDefault();
            await pasteToCurrentFrame();
            return;
          }
          if (cmd && key === "f") {
            e.preventDefault();
            pushUndo(getCurrentKey());
            flipLayerHorizontal(currentLayer());
            await redrawMain();
            setStatus("左右反転");
            return;
          }
          if (cmd && key === "s") {
            e.preventDefault();
            await els.saveCurrent.click();
            return;
          }
          if (!cmd && key === "h" && !isTypingElement(e.target)) {
            e.preventDefault();
            pushUndo(getCurrentKey());
            flipLayerVertical(currentLayer());
            await redrawMain();
            setStatus("上下反転");
            return;
          }
          if ((e.key === "Delete" || e.key === "Backspace") && !isTypingElement(e.target)) {
            e.preventDefault();
            pushUndo(getCurrentKey());
            clearLayer(currentLayer());
            await redrawMain();
            setStatus("現在フレームを全削除しました");
            return;
          }
        });

        els.addFav.addEventListener("click", () => {
          const hex = rgbaToHex(app.selectedColor);
          if (!app.favorites.includes(hex)) app.favorites.unshift(hex);
          if (app.favorites.length > 40) app.favorites.length = 40;
          saveFavoritesToStorage();
          renderPalettes();
        });

        els.hexInput.addEventListener("change", () => {
          const rgb = hexToRgb(els.hexInput.value);
          if (!rgb) return;
          app.selectedColor = rgb;
          app.hsv = rgbToHsv(rgb.r, rgb.g, rgb.b);
          app.tool = "pen";
          drawSVCanvas();
          renderPalettes();
        });

        function handleSVPick(ev) {
          const r = els.svCanvas.getBoundingClientRect();
          const x = Math.max(0, Math.min(r.width, ev.clientX - r.left));
          const y = Math.max(0, Math.min(r.height, ev.clientY - r.top));
          app.hsv.s = Math.round((x / r.width) * 100);
          app.hsv.v = Math.round(100 - (y / r.height) * 100);
          applyCurrentColorFromHSV();
          drawSVCanvas();
        }
        function handleHuePick(ev) {
          const r = els.hueCanvas.getBoundingClientRect();
          const y = Math.max(0, Math.min(r.height, ev.clientY - r.top));
          app.hsv.h = Math.round((y / r.height) * 360) % 360;
          applyCurrentColorFromHSV();
          drawSVCanvas();
        }

        els.svCanvas.addEventListener("pointerdown", (e) => {
          handleSVPick(e);
          const move = (m) => handleSVPick(m);
          const up = () => {
            window.removeEventListener("pointermove", move);
            window.removeEventListener("pointerup", up);
          };
          window.addEventListener("pointermove", move);
          window.addEventListener("pointerup", up);
        });

        els.hueCanvas.addEventListener("pointerdown", (e) => {
          handleHuePick(e);
          const move = (m) => handleHuePick(m);
          const up = () => {
            window.removeEventListener("pointermove", move);
            window.removeEventListener("pointerup", up);
          };
          window.addEventListener("pointermove", move);
          window.addEventListener("pointerup", up);
        });

        els.paintCanvas.addEventListener("contextmenu", (e) => e.preventDefault());
        els.paintCanvas.addEventListener("pointerdown", async (e) => {
          if (!app.loaded) return;
          if (e.button === 2) {
            e.preventDefault();
            app.prevTool = app.tool;
            app.eyedropTemp = true;
            app.eyedropTransparentHit = false;
            app.tool = "eyedrop";
            app.mouseDown = true;
            pickColorAt(e);
            renderPalettes();
            drawSVCanvas();
            await redrawMain();
            return;
          }
          if (e.button === 0 && (e.metaKey || e.ctrlKey)) {
            e.preventDefault();
            const start = pointerToPixel(e);
            app.moveDrag = true;
            app.moveStartPixel = { x: start.x, y: start.y };
            app.moveSnapshot = new Uint8ClampedArray(currentLayer());
            app.mouseDown = true;
            pushUndo(getCurrentKey());
            setStatus("移動中...");
            refreshToolUI();
            return;
          }
          app.mouseDown = true;
          await paintAt(e, true);
        });
        els.paintCanvas.addEventListener("pointermove", async (e) => {
          if (!app.loaded || !app.mouseDown) return;
          if (app.moveDrag && app.moveStartPixel && app.moveSnapshot) {
            const cur = pointerToPixel(e);
            const dx = cur.x - app.moveStartPixel.x;
            const dy = cur.y - app.moveStartPixel.y;
            applyMovedLayer(app.moveSnapshot, dx, dy);
            await redrawMain();
            return;
          }
          if (app.eyedropTemp) {
            pickColorAt(e);
            renderPalettes();
            drawSVCanvas();
            await redrawMain();
            return;
          }
          if (app.tool === "fill") return;
          await paintAt(e, false);
        });
        window.addEventListener("pointerup", async () => {
          if (!app.mouseDown) return;
          app.mouseDown = false;
          if (app.moveDrag) {
            app.moveDrag = false;
            app.moveStartPixel = null;
            app.moveSnapshot = null;
            refreshToolUI();
            setStatus("移動完了");
            return;
          }
          if (app.eyedropTemp) {
            app.eyedropTemp = false;
            app.tool = app.eyedropTransparentHit ? "erase" : "pen";
            renderPalettes();
            setStatus(app.eyedropTransparentHit ? "スポイト終了: 消しゴム" : "スポイト終了: ペン");
          }
        });
        window.addEventListener("pointercancel", () => {
          let changed = false;
          if (app.moveDrag) {
            app.moveDrag = false;
            app.moveStartPixel = null;
            app.moveSnapshot = null;
            changed = true;
          }
          if (app.eyedropTemp) {
            app.eyedropTemp = false;
            app.tool = app.eyedropTransparentHit ? "erase" : "pen";
            renderPalettes();
            return;
          }
          if (changed) refreshToolUI();
        });
        window.addEventListener("blur", () => {
          let changed = false;
          if (app.moveDrag) {
            app.moveDrag = false;
            app.moveStartPixel = null;
            app.moveSnapshot = null;
            changed = true;
          }
          if (app.eyedropTemp) {
            app.eyedropTemp = false;
            app.tool = app.eyedropTransparentHit ? "erase" : "pen";
            renderPalettes();
            return;
          }
          if (changed) refreshToolUI();
        });

        document.addEventListener("pointerdown", (e) => {
          if (!els.itemContextMenu.classList.contains("open")) return;
          if (els.itemContextMenu.contains(e.target)) return;
          hideItemContextMenu();
        });
        window.addEventListener("resize", hideItemContextMenu);
        window.addEventListener("scroll", hideItemContextMenu, true);
        els.menuCancelSkin.addEventListener("click", () => {
          hideItemContextMenu();
        });
        els.menuDeleteSkin.addEventListener("click", async () => {
          const target = app.contextMenuSkin;
          hideItemContextMenu();
          await deleteSkinByName(target);
        });

        function uniqueSkinName(baseName) {
          const base = String(baseName || "").trim() || "new_item";
          if (!app.skins.includes(base)) return base;
          let i = 2;
          while (app.skins.includes(`${base}_${i}`)) i += 1;
          return `${base}_${i}`;
        }

        async function addSkinFromInput() {
          const raw = (els.skinName.value || "").trim();
          const name = uniqueSkinName(raw || "new_item");
          if (!app.skins.includes(name)) app.skins.unshift(name);
          const prev = app.skinName;
          app.skinName = name;
          els.skinName.value = name;
          rebuildSkinSelect();
          await loadSkinFrames(name, prev);
          setStatus(`アイテム追加: ${name}`);
        }

        els.addSkin.addEventListener("click", async () => {
          await addSkinFromInput();
        });

        els.skinName.addEventListener("keydown", async (e) => {
          if (e.key !== "Enter") return;
          e.preventDefault();
          const name = (els.skinName.value || "").trim();
          if (!name) return;
          if (!app.skins.includes(name)) app.skins.unshift(name);
          const prev = app.skinName;
          app.skinName = name;
          rebuildSkinSelect();
          await loadSkinFrames(name, prev);
          setStatus(`読み込み: ${name}`);
        });

        els.newSkin.addEventListener("click", async () => {
          const name = (els.skinName.value || "new_skin").trim();
          app.skinName = name;
          if (!app.skins.includes(name)) app.skins.unshift(name);
          rebuildSkinSelect();
          for (const f of app.frames) {
            app.layerMap.set(f, createEmptyLayer());
            app.undoMap.set(f, []);
            app.redoMap.set(f, []);
          }
          app.skinDrafts.set(name, cloneLayerMap(app.layerMap));
          await extractItemColors(name);
          await redrawMain();
          setStatus(`新規: ${name}`);
        });

        els.pickDir.addEventListener("click", async () => {
          await chooseOutputRoot();
        });

        els.saveCurrent.addEventListener("click", async () => {
          try {
            await saveFrame(app.currentFrame);
            if (app.editorMode === "assets") setStatus(`保存: ${app.currentAssetPath}`);
            else setStatus(`保存: ${app.currentFrame}`);
          } catch (err) {
            setStatus(`保存失敗: ${err.message}`);
          }
        });

        els.saveAll.addEventListener("click", async () => {
          els.saveAll.disabled = true;
          try {
            if (app.editorMode === "assets") {
              if (!app.offlineMode || !app.outputRootHandle) throw new Error("file://で保存先を選択してください");
              const targets = [...app.assetDocMap.keys()];
              for (const p of targets) {
                app.currentAssetPath = p;
                // eslint-disable-next-line no-await-in-loop
                await saveFrame(p);
              }
              setStatus(`Assets保存完了: ${targets.length}件`);
            } else {
              for (const f of app.frames) {
                // eslint-disable-next-line no-await-in-loop
                await saveFrame(f);
              }
              setStatus(`全部保存完了: assets/skin/${(els.skinName.value || "").trim()}`);
            }
          } catch (err) {
            setStatus(`保存失敗: ${err.message}`);
          } finally {
            els.saveAll.disabled = false;
          }
        });

        init().catch((err) => {
          setStatus(`初期化エラー: ${err.message}`);
        });
      })();
    </script>
  </body>
</html>
