<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>やんさん農業ゲーム</title>
    <style>
      :root { color-scheme: only light; }
      html, body {
        width: 100%; height: 100%; margin: 0; overflow: hidden; background: #1d2e17;
      }
      body { font-family: "Hiragino Sans", "Yu Gothic", sans-serif; }
      canvas { width: 100vw; height: 100vh; display: block; cursor: none; touch-action: none; }
      #mobile-ui { position: fixed; inset: 0; pointer-events: none; z-index: 20; }
      #mobile-ui.hidden { display: none; }
      .dpad { position: absolute; left: 12px; bottom: 12px; width: 160px; height: 160px; pointer-events: auto; }
      .pad-btn {
        position: absolute; width: 52px; height: 52px; border: 2px solid rgba(245,248,255,0.55);
        background: rgba(28,42,36,0.62); color: #f5f7fb; border-radius: 10px; font-weight: 700; font-size: 18px;
        backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); touch-action: none;
      }
      .pad-btn:active { background: rgba(68,98,84,0.78); }
      .pad-up { left: 54px; top: 0; }
      .pad-left { left: 0; top: 54px; }
      .pad-right { right: 0; top: 54px; }
      .pad-down { left: 54px; bottom: 0; }
      .actions { position: absolute; right: 12px; bottom: 12px; display: grid; gap: 8px; pointer-events: auto; }
      .action-btn {
        min-width: 98px; height: 48px; border-radius: 10px; border: 2px solid rgba(245,248,255,0.55);
        background: rgba(28,42,36,0.62); color: #f5f7fb; font-weight: 700; font-size: 14px; touch-action: none;
      }
      .action-btn:active { background: rgba(68,98,84,0.78); }
      .quickbar {
        position: absolute; left: 50%; transform: translateX(-50%); bottom: 12px; display: grid;
        grid-template-columns: repeat(9, minmax(24px, 1fr)); gap: 4px; width: min(88vw, 520px); pointer-events: auto;
      }
      .slot-btn {
        height: 28px; border-radius: 6px; border: 1px solid rgba(245,248,255,0.45);
        background: rgba(23,34,29,0.62); color: #f5f7fb; font-size: 12px; touch-action: none;
      }
      .slot-btn.active { background: rgba(120,186,144,0.72); color: #102016; font-weight: 700; }
      @media (min-width: 1024px) and (pointer: fine) {
        #mobile-ui { display: none !important; }
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="mobile-ui" class="hidden" aria-hidden="true">
      <div class="dpad">
        <button class="pad-btn pad-up" data-move="up">▲</button>
        <button class="pad-btn pad-left" data-move="left">◀</button>
        <button class="pad-btn pad-right" data-move="right">▶</button>
        <button class="pad-btn pad-down" data-move="down">▼</button>
      </div>
      <div class="actions">
        <button id="mobile-action" class="action-btn">耕す</button>
        <button id="mobile-inventory" class="action-btn">インベントリ</button>
      </div>
      <div class="quickbar" id="mobile-quickbar">
        <button class="slot-btn" data-slot="1">1</button>
        <button class="slot-btn" data-slot="2">2</button>
        <button class="slot-btn" data-slot="3">3</button>
        <button class="slot-btn" data-slot="4">4</button>
        <button class="slot-btn" data-slot="5">5</button>
        <button class="slot-btn" data-slot="6">6</button>
        <button class="slot-btn" data-slot="7">7</button>
        <button class="slot-btn" data-slot="8">8</button>
        <button class="slot-btn" data-slot="9">9</button>
      </div>
    </div>
    <script src="tile.js"></script>
    <script src="terrain.js"></script>
    <script>
      window.TILE_DATA = window.TILE_DATA || null;
      window.TERRAIN_DATA = window.TERRAIN_DATA || null;

      // Fallback for file:// or when tile.js / terrain.js are not present.
      // Uses index3 editor's local data without any network request.
      if (!window.TILE_DATA || !window.TERRAIN_DATA) {
        try {
          const LAYER_IDS = [1, 1.5, 2, 3, 4, 5];
          const raw = localStorage.getItem("yansan_index3_editor_v3");
          if (raw) {
            const parsed = JSON.parse(raw);
            if (!window.TILE_DATA && Array.isArray(parsed?.tileset)) {
              const tiles = parsed.tileset
                .map((t) => ({
                  id: String(t?.id || ""),
                  src: String(t?.src || ""),
                  collision: (t?.collision === "h" || t?.collision === "v" || t?.collision === "full" || t?.collision === "none")
                    ? t.collision
                    : "none",
                }))
                .filter((t) => t.id && t.src);
              if (tiles.length) window.TILE_DATA = { tiles };
            }
            if (!window.TERRAIN_DATA && Number.isFinite(parsed?.mapW) && Number.isFinite(parsed?.mapH)) {
              const mapW = Math.max(1, Math.floor(parsed.mapW));
              const mapH = Math.max(1, Math.floor(parsed.mapH));
              const layers = [];
              const legacyLayerOrder = [1, 2, 3, 4, 5];
              const layerOrder = Array.isArray(parsed.layerOrder) && parsed.layerOrder.length
                ? parsed.layerOrder.map((v) => Number(v)).filter((v) => LAYER_IDS.includes(v))
                : (Array.isArray(parsed.layerCells) && parsed.layerCells.length === legacyLayerOrder.length
                    ? legacyLayerOrder
                    : LAYER_IDS);
              for (let li = 0; li < layerOrder.length; li += 1) {
                const sparse = {};
                const pairs = Array.isArray(parsed.layerCells?.[li])
                  ? parsed.layerCells[li]
                  : (li === 0 && Array.isArray(parsed.cells) ? parsed.cells : []);
                for (const pair of pairs) {
                  if (!Array.isArray(pair) || pair.length !== 2) continue;
                  const key = String(pair[0] || "");
                  const raw = pair[1];
                  if (!key || raw == null) continue;
                  if (typeof raw === "string") {
                    if (!raw) continue;
                    sparse[key] = raw;
                  } else if (typeof raw === "object") {
                    const id = String(raw.id || "");
                    if (!id) continue;
                    sparse[key] = {
                      id,
                      dir: raw.dir === "v" ? "v" : "h",
                    };
                  }
                }
                layers.push({
                  index: layerOrder[li],
                  default: layerOrder[li] === 1 ? "grass1" : null,
                  sparse,
                });
              }
              window.TERRAIN_DATA = {
                width: mapW,
                height: mapH,
                default: "grass1",
                sparse: layers[0].sparse,
                layers,
                origin: { x: 0, y: 0 },
                spawn: {
                  x: Number.isFinite(parsed?.spawn?.x) ? Math.max(0, Math.floor(parsed.spawn.x)) : 0,
                  y: Number.isFinite(parsed?.spawn?.y) ? Math.max(0, Math.floor(parsed.spawn.y)) : 0,
                },
              };
            }
          }
        } catch (_) {
          // Keep defaults when local data is malformed.
        }
      }
    </script>
    <script type="module" src="game.js"></script>
  </body>
</html>
