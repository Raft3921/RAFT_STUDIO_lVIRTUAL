<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>やんさん農業ゲーム タイル当たり判定エディタ(index4)</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b1020;
        color: #e7efff;
        font-family: "Segoe UI", sans-serif;
      }
      .app {
        width: 100%;
        height: 100dvh;
        display: grid;
        grid-template-columns: 340px 1fr;
      }
      .panel {
        padding: 12px;
        border-right: 1px solid rgba(255,255,255,0.08);
        background: rgba(8, 13, 28, 0.96);
        overflow: auto;
      }
      .panel h1 {
        margin: 0 0 10px;
        font-size: 18px;
      }
      .row { margin-bottom: 10px; }
      .row label {
        display: block;
        margin-bottom: 4px;
        font-size: 12px;
        color: rgba(231,239,255,0.78);
      }
      button, input, select {
        width: 100%;
        border: 1px solid rgba(120,170,255,0.35);
        border-radius: 8px;
        background: rgba(22,35,66,0.95);
        color: #e7efff;
        padding: 8px;
        font: inherit;
      }
      button { cursor: pointer; font-weight: 700; }
      .inline { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .tools { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
      .tool-btn.active {
        outline: 2px solid #9fcbff;
        border-color: rgba(165,210,255,0.95);
      }
      .item-list {
        max-height: 44vh;
        overflow: auto;
        border: 1px solid rgba(120,170,255,0.25);
        border-radius: 8px;
        background: rgba(12, 21, 40, 0.7);
        padding: 6px;
      }
      .item-row {
        display: grid;
        grid-template-columns: 28px 1fr;
        gap: 8px;
        align-items: center;
        padding: 4px 6px;
        border-radius: 6px;
        color: rgba(231,239,255,0.92);
        font-size: 12px;
        cursor: pointer;
      }
      .item-row + .item-row { margin-top: 3px; }
      .item-row:hover { background: rgba(42,70,120,0.35); }
      .item-row.active {
        outline: 2px solid #9fcbff;
        background: rgba(34,58,96,0.7);
      }
      .item-thumb {
        width: 24px;
        height: 24px;
        object-fit: contain;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        border: 1px solid rgba(120,170,255,0.35);
        border-radius: 4px;
        background: rgba(8,14,28,0.88);
      }
      .item-meta .sub {
        font-size: 11px;
        color: rgba(190,214,246,0.85);
      }
      .main {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-width: 0;
      }
      .toolbar, .status {
        padding: 10px 14px;
        background: rgba(8,13,28,0.82);
      }
      .toolbar { border-bottom: 1px solid rgba(255,255,255,0.08); }
      .status {
        border-top: 1px solid rgba(255,255,255,0.08);
        font-size: 12px;
        color: rgba(231,239,255,0.84);
      }
      .canvas-wrap {
        display: grid;
        place-items: center;
        background: #050a18;
      }
      canvas {
        width: min(78vmin, 560px);
        height: min(78vmin, 560px);
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        border: 1px solid rgba(255,255,255,0.12);
        background: #111a2e;
      }
      .hint {
        margin-top: 8px;
        font-size: 12px;
        line-height: 1.5;
        color: rgba(231,239,255,0.75);
      }
      @media (max-width: 980px) {
        .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
        .panel { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.08); }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="panel">
        <h1>タイル当たり判定エディタ (index4)</h1>
        <div class="row inline">
          <button id="pickDirBtn">保存先選択</button>
          <button id="loadBtn">読込</button>
        </div>
        <div class="row">
          <button id="saveBtn">tile.js 保存 (Cmd/Ctrl+S)</button>
        </div>
        <div class="row">
          <label for="searchInput">タイル検索</label>
          <input id="searchInput" type="text" placeholder="ID / パス で検索" />
        </div>
        <div class="row inline">
          <button id="tileModeBtn" class="tool-btn active">タイル</button>
          <button id="playerModeBtn" class="tool-btn">やんさん</button>
        </div>
        <div class="row">
          <div id="tileList" class="item-list"></div>
        </div>
        <div class="row">
          <label id="selectedLabel">選択中: -</label>
          <label style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <input id="fullTileCheckbox" type="checkbox" style="width:auto;" />
            <span>全面タイル（描画順切替を中央基準にする）</span>
          </label>
          <label style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <input id="sideTileCheckbox" type="checkbox" style="width:auto;" />
            <span>側面タイル（レイヤー2で暗く描画する）</span>
          </label>
          <div class="tools">
            <button id="toolDraw" class="tool-btn active" data-tool="draw">描く</button>
            <button id="toolErase" class="tool-btn" data-tool="erase">消す</button>
            <button id="fillBtn">全塗り</button>
            <button id="clearBtn">全消し</button>
          </div>
        </div>
        <div class="hint">
          16x16 グリッドを直接塗って当たり判定を作れます。<br />
          左ドラッグで塗り/消し、Cmd/Ctrl+Sで保存できます。<br />
          保存すると選択フォルダの `tile.js` を上書きします。
        </div>
      </aside>
      <main class="main">
        <div id="viewInfo" class="toolbar">読み込み中...</div>
        <div class="canvas-wrap">
          <canvas id="previewCanvas" width="512" height="512"></canvas>
        </div>
        <div id="status" class="status">準備中...</div>
      </main>
    </div>
    <script src="tile.js"></script>
    <script src="index4.js"></script>
  </body>
</html>
